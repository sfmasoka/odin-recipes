<h2>Ingredients</h2>
<ul>
    <li>1 cup mayonnaise</li>
    <li>2 teaspoons sweet pickle relish</li>
    <li>1 teaspoon prepared yellow mustard</li>
    <li>1 teaspoon lemon juice</li>
</ul>
<h2>Steps</h2>
<ol>
    <li>Gather all ingredients.</li>
    <li>Stir mayonnaise, relish, mustard, and lemon juice together in a bowl.</li>
</ol>
